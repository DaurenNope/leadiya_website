<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#bgGrad)" width="1200" height="630"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1E1E1E" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Logo -->
  <g transform="translate(80, 235)">
    <path fill="#00E5A0" d="M0 40 L40 20 L80 40 L80 80 L40 100 L0 80 Z"/>
    <path fill="#0A0A0A" d="M20 50 L40 40 L60 50 L60 70 L40 80 L20 70 Z"/>
  </g>
  
  <!-- Wordmark -->
  <text x="180" y="305" font-family="Syne, Arial, sans-serif" font-size="72" font-weight="800" fill="#F2F0EB" letter-spacing="-2">leadiya</text>
  
  <!-- Headline -->
  <text x="80" y="420" font-family="Syne, Arial, sans-serif" font-size="48" font-weight="700" fill="#F2F0EB" letter-spacing="-1">Kazakhstan Lead Intelligence Platform</text>
  
  <!-- Subhead -->
  <text x="80" y="475" font-family="JetBrains Mono, monospace" font-size="20" fill="#555555">Every KZ business. One dashboard. Always fresh.</text>
  
  <!-- Accent line -->
  <rect x="80" y="520" width="80" height="4" fill="#00E5A0"/>
  
  <!-- URL -->
  <text x="80" y="575" font-family="JetBrains Mono, monospace" font-size="16" fill="#0D6B5A">leadiya.com</text>
</svg>
